<script>
// Asset list: first is video, then images
const assets = [
    { type: 'video', src: 'https://www.youtube.com/embed/2Uej6gzpjw8', thumb: 'https://img.youtube.com/vi/2Uej6gzpjw8/maxresdefault.jpg' },
    { type: 'image', src: '../images/PIP/sc1.png' },
    { type: 'image', src: '../images/PIP/sc2.png' },
    { type: 'image', src: '../images/PIP/sc3.png' },
    { type: 'image', src: '../images/PIP/sc4.png' }
];
let emphasisIndex = 0;

function renderEmphasis() {
    const box = document.getElementById('emphasis-box');
    box.innerHTML = '';
    const asset = assets[emphasisIndex];
    if (asset.type === 'video') {
        const aspect = document.createElement('div');
        aspect.className = 'video-aspect';
        const iframe = document.createElement('iframe');
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = 'none';
        iframe.src = asset.src;
        iframe.frameBorder = 0;
        iframe.allowFullscreen = true;
        aspect.appendChild(iframe);
        box.appendChild(aspect);
    } else {
        const aspect = document.createElement('div');
        aspect.className = 'video-aspect';
        const img = document.createElement('img');
        img.src = asset.src;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.style.borderRadius = '8px';
        aspect.appendChild(img);
        box.appendChild(aspect);
    }
}

function renderSteamBar() {
    const bar = document.getElementById('steam-bar');
    bar.innerHTML = '';
    assets.forEach((asset, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'steam-thumb' + (idx === emphasisIndex ? ' active' : '');
        if (asset.type === 'video') {
            // Use thumbnail for video (could be improved with a real video thumb)
            const img = document.createElement('img');
            img.src = asset.thumb || '../images/proj3.jpg';
            img.alt = 'Video';
            thumb.appendChild(img);
            const playIcon = document.createElement('span');
            playIcon.className = 'play-icon';
            playIcon.innerHTML = '&#9658;';
            thumb.appendChild(playIcon);
        } else {
            const img = document.createElement('img');
            img.src = asset.src;
            img.alt = 'Image';
            thumb.appendChild(img);
        }
        thumb.onclick = () => {
            emphasisIndex = idx;
            renderEmphasis();
            renderSteamBar();
        };
        bar.appendChild(thumb);
    });
}

function scrollEmphasis(dir) {
    emphasisIndex = (emphasisIndex + dir + assets.length) % assets.length;
    renderEmphasis();
    renderSteamBar();
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('steam-arrow-left').onclick = () => scrollEmphasis(-1);
    document.getElementById('steam-arrow-right').onclick = () => scrollEmphasis(1);
    renderEmphasis();
    renderSteamBar();
});
</script>

<script>
const VIDEO_URL = 'https://www.youtube.com/embed/PhhJX4UiVpM';

function swapMedia(imgElem) {
    const mainBox = document.getElementById('main-media-box');
    const mainMedia = document.getElementById('main-media');
    // If current main is video, swap with image
    if (mainMedia.querySelector('iframe')) {
        const newImg = document.createElement('img');
        newImg.src = imgElem.src;
        newImg.style.width = '100%';
        newImg.style.height = '100%';
        newImg.style.objectFit = 'cover';
        newImg.style.borderRadius = '8px';
        mainMedia.innerHTML = '';
        mainMedia.appendChild(newImg);
        // Replace clicked image with video
        const newVideo = document.createElement('iframe');
        newVideo.src = VIDEO_URL;
        newVideo.frameBorder = 0;
        newVideo.allowFullscreen = true;
        imgElem.parentNode.replaceChild(newVideo, imgElem);
        newVideo.style.width = '110%';
        newVideo.style.maxWidth = '100vw';
        newVideo.style.aspectRatio = '3/2';
        newVideo.style.borderRadius = '6px';
        newVideo.style.border = '1px solid #2a2f3a';
        newVideo.style.cursor = 'pointer';
        newVideo.onclick = function() { swapMedia(newVideo); };
    } else if (mainMedia.querySelector('img')) {
        // If current main is image, swap back with video
        const mainImg = mainMedia.querySelector('img');
        const newVideo = document.createElement('iframe');
        newVideo.src = VIDEO_URL;
        newVideo.frameBorder = 0;
        newVideo.allowFullscreen = true;
        mainMedia.innerHTML = '';
        mainMedia.appendChild(newVideo);
        // Replace clicked video with image
        const newImg = document.createElement('img');
        newImg.src = mainImg.src;
        newImg.style.width = '110%';
        newImg.style.maxWidth = '198px';
        newImg.style.borderRadius = '6px';
        newImg.style.border = '1px solid #2a2f3a';
        newImg.style.cursor = 'pointer';
        newImg.onclick = function() { swapMedia(newImg); };
        imgElem.parentNode.replaceChild(newImg, imgElem);
    }
}
</script>
